name: CS144 CI

"on":
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read

concurrency:
  group: cs144-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Debug build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: |
          set +e
          cmake --build build --parallel 2 > build.log 2>&1
          status=$?
          tail -n 120 build.log
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Run unit and local FSM tests
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --timeout 20 \
            -R '^(t_byte_stream_|t_strm_reassem_|t_wrapping_ints_|t_recv_|t_send_|t_active_close$|t_passive_close$|t_ack_rst$|t_ack_rst_win$|t_connect$|t_listen$|t_winsize$|t_retx$|t_retx_win$|t_loopback$|t_loopback_win$|t_reorder$|t_address_dt$|t_parser_dt$|t_socket_dt$|t_udp_connection$|arp_network_interface$|router_test$)'
